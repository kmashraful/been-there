<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="The Gazetteer: a browsable index of every place on the Been There travel story map, with details and an interactive map.">
  <meta name="theme-color" content="#000000">
  <title>The Gazetteer &middot; Been There</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">

  <link rel="stylesheet" href="./style.css">
</head>
<body class="page-gazetteer">
  <a class="skip-link" href="#indexList">Skip to the index</a>

  <header class="topbar">
    <a class="brand" href="./index.html" aria-label="Been There home">
      <svg class="brand-mark" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"
           fill="none" stroke="currentColor" stroke-width="1.6">
        <circle cx="12" cy="12" r="7"></circle>
        <line x1="12" y1="1.5" x2="12" y2="6"></line>
        <line x1="12" y1="18" x2="12" y2="22.5"></line>
        <line x1="1.5" y1="12" x2="6" y2="12"></line>
        <line x1="18" y1="12" x2="22.5" y2="12"></line>
        <circle cx="12" cy="12" r="1.4" fill="currentColor" stroke="none"></circle>
      </svg>
      <span class="brand-name">BEEN THERE</span>
      <span class="brand-sub mono">TRAVEL STORY MAP</span>
    </a>
    <nav class="topnav" aria-label="Primary">
      <a href="./index.html">Journey</a>
      <a href="./gazetteer.html" aria-current="page">Gazetteer</a>
    </nav>
  </header>

  <main class="gaz-layout">
    <aside class="gaz-panel">
      <p class="kicker mono">Index of every place</p>
      <h1>The Gazetteer</h1>
      <p id="gazStats" class="gaz-stats mono"></p>

      <article id="detailCard" class="detail-card" hidden aria-live="polite"></article>

      <ol id="indexList" class="index-list"></ol>
    </aside>

    <div class="gaz-map-wrap">
      <div id="map" aria-label="Map of all places"></div>
      <button id="overviewBtn" class="overview-btn mono" type="button" hidden
              aria-label="Back to the overview of all places">
        <svg viewBox="0 0 24 24" width="13" height="13" aria-hidden="true">
          <path fill="currentColor" d="M21,16V14L13,9V3.5A1.5,1.5 0 0,0 11.5,2A1.5,1.5 0 0,0 10,3.5V9L2,14V16L10,13.5V19L8,20.5V22L11.5,21L15,22V20.5L13,19V13.5L21,16Z"/>
        </svg>
        Back to 30,000 ft
      </button>
    </div>
  </main>

  <footer>
    <p>Built with <a href="https://leafletjs.com" rel="noopener">Leaflet</a>.
       Map: &copy; CARTO &copy; OpenStreetMap contributors.
       &copy; <span id="year"></span> Ashraful.</p>
  </footer>

  <noscript>
    <p class="noscript">This index needs JavaScript to render the map and place list.</p>
  </noscript>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script src="./places.js"></script>
  <script src="./app.js"></script>
</body>
</html>
